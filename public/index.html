<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Big6Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="global-nav">
    <a href="index.html" class="logo">Big6<span>Hub</span></a>
    <div class="auth">
      <a href="auth.html" class="btn-login">Log in</a>
      <a href="auth.html" class="btn-signup">Sign up</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Discover the Premier League Big 6</h1>
    <p>Six clubs · seasons · players · history</p>
  </div>

  <div class="container">
    <div class="content">
      <div class="teams-grid" id="teams-grid">

        <a href="team.html?slug=arsenal" class="team-card">
          <div class="team-card-img" style="background:#CE3023;"></div>
          <div class="team-card-body"><div class="name">Arsenal</div></div>
        </a>

        <a href="team.html?slug=chelsea" class="team-card">
          <div class="team-card-img" style="background:#2D468F;"></div>
          <div class="team-card-body"><div class="name">Chelsea</div></div>
        </a>

        <a href="team.html?slug=liverpool" class="team-card">
          <div class="team-card-img" style="background:#AD2C35;"></div>
          <div class="team-card-body"><div class="name">Liverpool</div></div>
        </a>

        <a href="team.html?slug=mancity" class="team-card">
          <div class="team-card-img" style="background:#A5C0E3;"></div>
          <div class="team-card-body"><div class="name">Manchester City</div></div>
        </a>

        <a href="team.html?slug=manutd" class="team-card">
          <div class="team-card-img" style="background:#BC2B22;"></div>
          <div class="team-card-body"><div class="name">Manchester United</div></div>
        </a>

        <a href="team.html?slug=tottenham" class="team-card">
          <div class="team-card-img" style="background:#192148;"></div>
          <div class="team-card-body"><div class="name">Tottenham</div></div>
        </a>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
