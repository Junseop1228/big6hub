<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth — Big6Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="global-nav">
    <a href="index.html" class="logo">Big6<span>Hub</span></a>
  </nav>

  <div class="auth-page">
    <div class="auth-card">

      <h1>Welcome to Big6Hub</h1>
      <p class="auth-subtitle">Track your favourite clubs, players, and seasons.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log in</button>
        <button class="auth-tab" data-tab="register">Sign up</button>
      </div>

      <div class="alert" id="alert"></div>

      <form class="auth-form active" id="form-login">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required/>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-submit">Log in</button>
      </form>

      <form class="auth-form" id="form-register">
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required/>
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" required/>
        </div>
        <div class="field">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-submit">Create account</button>
      </form>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/session.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
