<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorites · Big6Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .fav-section-title {
      font-size: 18px; font-weight: 800; margin: 32px 0 16px;
    }
    .fav-section-title:first-child { margin-top: 0; }

    .fav-empty-section {
      font-size: 13px; color: #767676;
      padding: 20px 0; border-top: 1px solid #f5f5f5;
    }

    /* player cards */
    .players-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    }
    .player-card {
      border: 1px solid #ebebeb; border-radius: 14px;
      padding: 18px 20px; text-decoration: none; color: #222;
      transition: box-shadow 0.2s; display: block;
    }
    .player-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .player-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .player-meta { font-size: 12px; color: #767676; }

    /* empty state */
    #fav-empty {
      display: none; text-align: center;
      padding: 80px 0; color: #767676;
    }
    #fav-empty p { font-size: 16px; margin-bottom: 12px; }
    #fav-empty a {
      font-size: 14px; font-weight: 600; color: #610e84; text-decoration: none;
    }

    @media (max-width: 768px) {
      .players-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .players-grid { grid-template-columns: 1fr; }
      .teams-grid   { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <nav class="global-nav">
    <a href="index.html" class="logo">Big6<span>Hub</span></a>
    <div class="auth"></div>
  </nav>

  <div class="container">
    <div class="content">

      <div id="fav-empty">
        <p>You haven't saved any favourites yet.</p>
        <a href="index.html">Browse clubs →</a>
      </div>

      <div id="fav-main">
        <h2 class="fav-section-title">Clubs</h2>
        <div class="teams-grid" id="fav-teams-grid">
          <p class="fav-empty-section">No favourite clubs yet.</p>
        </div>

        <h2 class="fav-section-title">Players</h2>
        <div class="players-grid" id="fav-players-grid">
          <p class="fav-empty-section">No favourite players yet.</p>
        </div>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/session.js"></script>
  <script src="js/favorites.js"></script>
  <script>
    // guard — redirect to auth if not logged in
    sessionRequireLogin();
    // load favorites on page ready
    document.addEventListener('DOMContentLoaded', loadFavorites);
  </script>
</body>
</html>
